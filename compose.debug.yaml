services:
  vpimplab1:
    image: vpimplab1
    build:
      context: .
      dockerfile: ./Dockerfile
    command: ["sh", "-c", "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 -m uvicorn main:app --host 0.0.0.0 --port 4200"]
    ports:
      - 4200:4200
      - 5678:5678
